<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PEPA — Back Office Agent · Bohemia Reality</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
/* ===== THEMES ===== */
:root{
  --gold:#C9A84C;--gold-dim:rgba(201,168,76,.12);--gold-border:rgba(201,168,76,.28);
  --bg:#0F0E0A;--bg2:#15130E;--bg3:#1C1A13;--bg4:#232018;
  --surface:#1E1C15;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.04);
  --text:#E8E0CC;--text2:#A89E88;--text3:#6B6455;--green:#4A7C59;
  --shadow:rgba(0,0,0,.4);--r:10px;--rs:6px;
}
[data-theme="light"]{
  --bg:#F5F3EE;--bg2:#EEEBE3;--bg3:#E5E0D4;--bg4:#DDD8CC;
  --surface:#FFFFFF;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.04);
  --text:#1A1814;--text2:#5A5040;--text3:#9A8E78;
  --shadow:rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
button{font-family:'DM Sans',sans-serif;cursor:pointer}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{width:256px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .2s}
.sidebar-top{flex-shrink:0}
.sidebar-scroll{flex:1;overflow-y:auto;padding-bottom:8px}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;padding:18px 16px 16px;border-bottom:1px solid var(--border)}
.logo-icon{font-size:22px}
.logo-name{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold);letter-spacing:.05em;line-height:1.1}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.logo-right{margin-left:auto;display:flex;gap:4px}

/* Theme toggle */
.icon-btn{background:none;border:none;color:var(--text3);padding:5px;border-radius:var(--rs);font-size:14px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--bg3);color:var(--text)}

/* Nav */
.nav{padding:10px 8px 6px;border-bottom:1px solid var(--border2)}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border:none;background:none;color:var(--text2);font-size:13px;border-radius:var(--rs);transition:all .15s;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);font-weight:500}
.nav-icon{font-size:15px;width:16px;text-align:center;flex-shrink:0}

/* Chats section */
.section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:12px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.section-label button{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s}
.section-label button:hover{color:var(--gold)}

.chat-list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;transition:all .15s;margin:1px 8px;group:hover}
.chat-list-item:hover{background:var(--bg3)}
.chat-list-item.active{background:var(--gold-dim)}
.chat-list-item.active .cli-title{color:var(--gold)}
.cli-icon{font-size:13px;flex-shrink:0}
.cli-title{flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
.cli-del{background:none;border:none;color:var(--text3);font-size:14px;padding:2px 4px;border-radius:3px;opacity:0;transition:all .15s;line-height:1}
.chat-list-item:hover .cli-del{opacity:1}
.cli-del:hover{color:#E88;background:rgba(232,136,136,.1)}

/* Quick actions */
.qa-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px}
.qa-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.qa-add{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 2px;transition:color .15s;line-height:1}
.qa-add:hover{color:var(--gold)}
.qa-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 16px);margin:1px 8px;padding:7px 10px;border:none;background:none;color:var(--text2);font-size:12px;border-radius:var(--rs);transition:all .15s;text-align:left}
.qa-btn:hover{background:var(--bg3);color:var(--text)}
.qa-icon{font-size:13px;flex-shrink:0}
.qa-label{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qa-del{background:none;border:none;color:var(--text3);font-size:13px;padding:2px 4px;border-radius:3px;opacity:0;transition:all .15s}
.qa-btn:hover .qa-del{opacity:1}
.qa-del:hover{color:#E88}

/* Sidebar footer */
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.company-badge{font-size:11px;color:var(--text3);font-weight:500}
.version{font-size:10px;color:var(--text3);margin-top:2px;opacity:.6}

/* ===== MAIN ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* ===== CHAT VIEW ===== */
.chat-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-header{padding:13px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;transition:background .2s}
.chat-header-left{display:flex;flex-direction:column;gap:2px}
.agent-status{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--text)}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4A7C59;box-shadow:0 0 6px rgba(74,124,89,.6);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.chat-sub{font-size:11px;color:var(--text3)}
.chat-header-right{display:flex;gap:6px}
.header-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:var(--rs);font-size:12px;transition:all .15s;display:flex;align-items:center;gap:5px}
.header-btn:hover{border-color:var(--gold-border);color:var(--gold)}

/* Messages */
.messages-area{flex:1;overflow-y:auto;padding:20px 0;scroll-behavior:smooth}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Welcome */
.welcome{max-width:500px;margin:32px auto;padding:0 24px;text-align:center}
.welcome-avatar{width:52px;height:52px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px}
.welcome h2{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);margin-bottom:8px}
.welcome p{color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:20px}
.welcome-hints{display:flex;flex-direction:column;gap:6px}
.hint{padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);font-size:12px;color:var(--text2);text-align:left;cursor:pointer;transition:all .15s}
.hint:hover{border-color:var(--gold-border);color:var(--text);background:var(--bg3)}

/* Messages */
.message{display:flex;gap:10px;padding:6px 24px;max-width:860px;margin:0 auto;width:100%;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:12px}
.message.assistant .msg-avatar{background:var(--gold-dim);border:1px solid var(--gold-border)}
.message.user .msg-avatar{background:var(--bg3);border:1px solid var(--border)}
.msg-bubble{flex:1;min-width:0}
.message.user .msg-bubble{display:flex;justify-content:flex-end}
.user-text{background:var(--bg3);border:1px solid var(--border);border-radius:12px 4px 12px 12px;padding:9px 13px;max-width:70%;color:var(--text);font-size:14px;line-height:1.6}
.thinking{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px;padding:4px 0}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Markdown */
.md-content{color:var(--text2);line-height:1.7}
.md-content h1,.md-content h2{font-family:'DM Serif Display',serif;color:var(--text);margin:16px 0 8px}
.md-content h3{font-size:13px;font-weight:600;color:var(--gold);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.06em}
.md-content p{margin-bottom:10px;color:var(--text2)}
.md-content p:last-child{margin-bottom:0}
.md-content strong{color:var(--text);font-weight:600}
.md-content em{color:var(--gold);font-style:italic}
.md-content ul{list-style:none;padding:0;margin:8px 0}
.md-content li{padding:3px 0 3px 16px;position:relative;color:var(--text2)}
.md-content li::before{content:'◆';position:absolute;left:0;color:var(--gold);font-size:8px;top:7px}
.md-content code{background:var(--bg3);padding:1px 6px;border-radius:3px;font-size:12px;color:var(--gold);font-family:monospace}

/* Charts */
.chart-wrap{margin:12px 0;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:background .2s}
.chart-title-text{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border2)}

/* Table */
.tbl-wrap{margin:12px 0;overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:background .2s}
.tbl-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;padding:12px 14px 8px;border-bottom:1px solid var(--border2)}
table.data-table{width:100%;border-collapse:collapse;font-size:12px}
table.data-table th{text-align:left;padding:8px 14px;color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--gold-border);font-weight:600;white-space:nowrap}
table.data-table td{padding:8px 14px;color:var(--text2);border-bottom:1px solid var(--border2);white-space:nowrap}
table.data-table tr:last-child td{border-bottom:none}
table.data-table tr:hover td{background:var(--bg3);color:var(--text)}

/* Slides */
.slides-wrap{margin:12px 0;border:1px solid var(--gold-border);border-radius:var(--r);overflow:hidden}
.slide{padding:24px 28px;background:linear-gradient(135deg,var(--surface) 0%,var(--bg3) 100%);min-height:180px;transition:background .2s}
.slide-num{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.slide-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:14px;line-height:1.2}
.slide-body{color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:12px}
.slide-bullets{list-style:none;padding:0;display:flex;flex-direction:column;gap:7px}
.slide-bullets li{padding:7px 12px;background:rgba(255,255,255,.04);border-left:2px solid var(--gold);border-radius:0 5px 5px 0;color:var(--text2);font-size:13px}
.slide-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:8px}
.stat-val{font-family:'DM Serif Display',serif;font-size:28px;color:var(--gold);line-height:1;display:block}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.slide-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;background:var(--bg3);border-top:1px solid var(--border)}
.slide-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;font-size:14px;transition:all .15s}
.slide-btn:hover:not(:disabled){border-color:var(--gold-border);color:var(--gold)}
.slide-btn:disabled{opacity:.3;cursor:not-allowed}
.slide-dots{display:flex;gap:5px}
.slide-dot{width:6px;height:6px;border-radius:50%;background:var(--border);border:none;padding:0;cursor:pointer;transition:all .15s}
.slide-dot.active{background:var(--gold)}

/* Input */
.input-area{padding:14px 24px 18px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;transition:background .2s}
.input-wrap{display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px 4px 4px 14px;transition:border-color .15s,background .2s}
.input-wrap:focus-within{border-color:var(--gold-border)}
.chat-input{flex:1;background:none;border:none;outline:none;resize:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;max-height:120px;padding:8px 0;overflow-y:auto}
.chat-input::placeholder{color:var(--text3)}
.send-btn{width:34px;height:34px;border-radius:7px;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;color:#0F0E0A;flex-shrink:0;transition:all .15s;font-size:15px;margin-bottom:2px}
.send-btn:hover:not(:disabled){background:#D4B460;transform:translateY(-1px)}
.send-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed;transform:none}
.input-hint{font-size:10px;color:var(--text3);margin-top:6px;text-align:center}

/* Dashboard */
.dash-view{flex:1;overflow-y:auto;padding:24px 28px}
.dash-view::-webkit-scrollbar{width:4px}
.dash-view::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.view-hdr h1{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);margin-bottom:4px}
.view-hdr p{color:var(--text3);font-size:13px;margin-bottom:20px}
.dash-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.dash-date{font-size:13px;color:var(--text2)}
.dash-live{font-size:11px;color:#4A7C59;font-weight:500}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.kpi-card{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;gap:10px;align-items:flex-start;transition:border-color .15s,background .2s}
.kpi-card:hover{border-color:var(--gold-border)}
.kpi-card.accent{border-color:rgba(201,168,76,.35)}
.kpi-ico{width:28px;height:28px;border-radius:6px;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:13px}
.kpi-val{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1.1}
.kpi-lbl{font-size:12px;color:var(--text2);margin-top:2px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.section-hdr{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:600}
.highlights{display:flex;flex-direction:column;gap:5px;margin-bottom:20px}
.hl-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text2);transition:background .2s}
.hl-dot{color:var(--gold);font-size:8px;margin-top:4px;flex-shrink:0}
.agents-list{display:flex;flex-direction:column;gap:6px}
.agent-row{display:grid;grid-template-columns:1fr 80px 90px 100px;gap:14px;align-items:center;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);transition:background .2s}
.agent-name{font-size:13px;font-weight:500;color:var(--text)}
.agent-deals{font-size:12px;color:var(--text2)}
.agent-rev{font-size:12px;color:var(--gold)}
.bar-wrap{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#D4B460);border-radius:2px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:380px;max-width:90vw;box-shadow:0 20px 60px var(--shadow)}
.modal h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);margin-bottom:16px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.modal-field input,.modal-field textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.modal-field input:focus,.modal-field textarea:focus{border-color:var(--gold-border)}
.modal-field textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-primary{background:var(--gold);color:#0F0E0A;border:none;padding:8px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;transition:all .15s}
.btn-primary:hover{background:#D4B460}
.btn-secondary{background:none;color:var(--text2);border:1px solid var(--border);padding:8px 18px;border-radius:var(--rs);font-size:13px;transition:all .15s}
.btn-secondary:hover{border-color:var(--gold-border);color:var(--text)}

/* Error */
.error-banner{padding:9px 13px;background:rgba(139,44,44,.2);border:1px solid rgba(139,44,44,.4);border-radius:var(--rs);color:#E88;font-size:13px;margin:6px 0}
</style>
</head>

<div id="root"></div>
<script>
// ============================================================
// DATA
// ============================================================
const properties = [
  {id:"NEM-001",name:"Byt 3+kk, Vinohrady",address:"Mánesova 45, Praha 2",type:"byt",size:82,price:8900000,status:"prodáno",agent:"Markéta Horáčková",reconstruction:"2019",energyClass:"B",notes:""},
  {id:"NEM-002",name:"Rodinný dům, Průhonice",address:"Kytínská 12, Průhonice",type:"dům",size:210,price:15500000,status:"k prodeji",agent:"Tomáš Novák",reconstruction:null,energyClass:"C",notes:"Chybí info o rekonstrukci a stáří střechy"},
  {id:"NEM-003",name:"Kancelář, Smíchov",address:"Radlická 180, Praha 5",type:"komerční",size:155,price:42000,status:"pronájem",agent:"Jana Veselá",reconstruction:"2022",energyClass:"A",notes:""},

  {id:"NEM-005",name:"Byt 2+1, Dejvice",address:"Jugoslávských partyzánů 22, Praha 6",type:"byt",size:65,price:7100000,status:"rezervace",agent:"Tomáš Novák",reconstruction:"2023",energyClass:"B",notes:""},
  {id:"NEM-006",name:"Vila, Průhonice",address:"Dobřejovická 5, Průhonice",type:"dům",size:380,price:28000000,status:"k prodeji",agent:"Jana Veselá",reconstruction:null,energyClass:null,notes:"Chybí energetický průkaz, rekonstrukce neznámá"},
  {id:"NEM-007",name:"Byt 4+kk, Holešovice",address:"Tusarova 31, Praha 7",type:"byt",size:105,price:11200000,status:"prodáno",agent:"Markéta Horáčková",reconstruction:"2020",energyClass:"B",notes:""},

async function callAgent(messages) {
  const r = await fetch("/api/claude", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:SYSTEM_PROMPT,messages})
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message || "API error");
  return d.content[0]?.text || "Prázdná odpověď.";
}

function parseResponse(text) {
  const parts=[];
  const re=/```(chart|table|slides)([\s\S]*?)```/g;
  let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last){const t=text.slice(last,m.index).trim();if(t)parts.push({type:"text",content:t});}
    try{parts.push({type:m[1],content:JSON.parse(m[2].trim())});}catch(e){parts.push({type:"text",content:m[0]});}
    last=m.index+m[0].length;
  }
  if(last<text.length){const t=text.slice(last).trim();if(t)parts.push({type:"text",content:t});}
  if(!parts.length)parts.push({type:"text",content:text});
  return parts;
}
function renderMd(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>').replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,m=>`<ul>${m}</ul>`)
    .split('\n\n').map(p=>{if(/^<[hul]/.test(p.trim()))return p;if(!p.trim())return'';return`<p>${p.replace(/\n/g,'<br/>')}</p>`;}).join('');
}

        React.createElement('button',{className:`nav-item${view==='dashboard'?' active':''}`,onClick:()=>setView('dashboard')},React.createElement('span',{className:'nav-icon'},'📊'),React.createElement('span',null,'Dashboard'))
      )
    ),
    React.createElement('div',{className:'sidebar-scroll'},
      // Chats
      React.createElement('div',{className:'section-label'},'Konverzace',React.createElement('button',{onClick:newChat,title:'Nový chat'},'+')
      ),
      ...chats.map(chat=>React.createElement('div',{key:chat.id,className:`chat-list-item${chat.id===activeChatId?' active':''}`,onClick:()=>{setActiveChatId(chat.id);setView('chat');}},
        React.createElement('span',{className:'cli-icon'},'💬'),
        React.createElement('span',{className:'cli-title'},chat.title),
        chats.length>1&&React.createElement('button',{className:'cli-del',onClick:e=>{e.stopPropagation();deleteChat(chat.id);}},'×')
      )),
      // Quick actions
      React.createElement('div',{className:'qa-header'},
        React.createElement('span',{className:'qa-title'},'Rychlé akce'),
        React.createElement('button',{className:'qa-add',onClick:()=>setShowAddQA(true),title:'Přidat rychlou akci'},'+')
      ),
      ...quickActions.map(q=>React.createElement('button',{key:q.id,className:'qa-btn',onClick:()=>{setView('chat');send(q.prompt);}},
        React.createElement('span',{className:'qa-icon'},q.icon),
        React.createElement('span',{className:'qa-label'},q.label),
        React.createElement('button',{className:'qa-del',onClick:e=>{e.stopPropagation();deleteQA(q.id);}},'-')
      ))
    ),
    React.createElement('div',{className:'sidebar-footer'},
      React.createElement('div',{className:'company-badge'},'Bohemia Reality s.r.o.'),
      React.createElement('div',{className:'version'},'v2.0 · Praha · 2025')
    )
  );

  const chatView=React.createElement('div',{className:'chat-view'},
    React.createElement('div',{className:'chat-header'},
      React.createElement('div',{className:'chat-header-left'},
        React.createElement('div',{className:'agent-status'},React.createElement('span',{className:'status-dot'}),'PEPA je online'),
        React.createElement('div',{className:'chat-sub'},activeChat.title==='Nový chat'?'Bohemia Reality s.r.o. · Back Office Agent':activeChat.title)
      ),
      React.createElement('div',{className:'chat-header-right'},
        React.createElement('button',{className:'header-btn',onClick:()=>{setChats(prev=>prev.map(c=>c.id===activeChatId?{...c,msgs:[],title:'Nový chat'}:c));setError('');}},
          '🗑️ Vymazat chat'
        ),
        React.createElement('button',{className:'header-btn',onClick:newChat},'+ Nový chat')
      )
    ),
    React.createElement('div',{className:'messages-area'},
      activeChat.msgs.length===0&&React.createElement('div',{className:'welcome'},
        React.createElement('div',{className:'welcome-avatar'},'🏢'),
        React.createElement('h2',null,'Dobrý den, já jsem PEPA'),
        React.createElement('p',null,'Váš back office asistent pro Bohemia Reality. Zeptejte se na data, reporty, e-maily nebo grafy.'),
        React.createElement('div',{className:'welcome-hints'},
          React.createElement('div',{className:'hint',onClick:()=>send("Jaký je aktuální stav portfolia?")},'💼 Stav portfolia nemovitostí'),
          React.createElement('div',{className:'hint',onClick:()=>send("Vytvoř graf vývoje leadů za posledních 6 měsíců.")},'📊 Graf vývoje leadů'),
          React.createElement('div',{className:'hint',onClick:()=>send("Které nemovitosti mají chybějící dokumentaci?")},'🔍 Chybějící dokumentace')
        )
      ),
      activeChat.msgs.map((m,i)=>React.createElement('div',{key:i,className:`message ${m.role}`},
        React.createElement('div',{className:'msg-avatar'},m.role==='assistant'?'🤖':'👤'),
        React.createElement('div',{className:'msg-bubble'},m.role==='user'?React.createElement('div',{className:'user-text'},m.content):React.createElement(MsgContent,{text:m.content}))
      )),
      loading&&React.createElement('div',{className:'message assistant'},
        React.createElement('div',{className:'msg-avatar'},'🤖'),
        React.createElement('div',{className:'msg-bubble'},React.createElement('div',{className:'thinking'},React.createElement('span',{className:'spin'},'⟳'),' PEPA přemýšlí…'))
      ),
      React.createElement('div',{ref:endRef})
    ),
    error&&React.createElement('div',{className:'error-banner',style:{margin:'0 24px 6px'}},error),
    React.createElement('div',{className:'input-area'},
      React.createElement('div',{className:'input-wrap'},
        React.createElement('textarea',{ref:inputRef,value:input,onChange:e=>setInput(e.target.value),onKeyDown:onKey,placeholder:'Napište dotaz nebo instrukci…',rows:1,className:'chat-input'}),
        React.createElement('button',{className:'send-btn',disabled:!input.trim()||loading,onClick:()=>send()},loading?React.createElement('span',{className:'spin'},'⟳'):'↑')
      ),
      React.createElement('div',{className:'input-hint'},'Enter pro odeslání · Shift+Enter pro nový řádek')
    )
  );

  return React.createElement('div',{className:'app'},
    sidebar,
    React.createElement('main',{className:'main'},view==='dashboard'?React.createElement(Dashboard):chatView),
    showAddQA&&React.createElement(AddQAModal,{onSave:addQA,onClose:()=>setShowAddQA(false)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
