<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>

<style>
:root{
  --gold:#C9A84C;--gold-dim:rgba(201,168,76,.12);--gold-border:rgba(201,168,76,.28);
  --bg:#0F0E0A;--bg2:#15130E;--bg3:#1C1A13;--bg4:#232018;
  --surface:#1E1C15;--surface2:#252318;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.04);
  --text:#E8E0CC;--text2:#A89E88;--text3:#6B6455;
  --green:#4A7C59;--r:10px;--rs:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:'DM Sans',sans-serif}

/* LAYOUT */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--border)}
.logo{display:flex;align-items:center;gap:10px;padding:20px 16px 18px;border-bottom:1px solid var(--border)}
.logo-icon{font-size:22px;line-height:1}
.logo-name{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold);letter-spacing:.05em;line-height:1.1}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.nav{padding:12px 8px 6px;border-bottom:1px solid var(--border2)}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border:none;background:none;color:var(--text2);font-size:13px;cursor:pointer;border-radius:var(--rs);transition:all .15s;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);font-weight:500}
.nav-icon{font-size:15px;width:16px;text-align:center}
.qa-section{padding:12px 8px;flex:1}
.qa-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:4px 10px 8px}
.qa-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;background:none;color:var(--text2);font-size:12px;cursor:pointer;border-radius:var(--rs);transition:all .15s;text-align:left}
.qa-btn:hover{background:var(--bg3);color:var(--text)}
.qa-icon{font-size:13px;flex-shrink:0}
.qa-label{flex:1;text-align:left}
.qa-arrow{color:var(--text3);font-size:11px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.company-badge{font-size:11px;color:var(--text3);font-weight:500}
.version{font-size:10px;color:var(--text3);margin-top:2px;opacity:.6}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* CHAT */
.chat-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-header{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.agent-status{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--text)}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4A7C59;box-shadow:0 0 6px rgba(74,124,89,.6);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.chat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.messages-area{flex:1;overflow-y:auto;padding:24px 0;scroll-behavior:smooth}
.messages-area::-webkit-scrollbar{width:4px}.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* WELCOME */
.welcome{max-width:520px;margin:40px auto;padding:0 24px;text-align:center}
.welcome-avatar{width:56px;height:56px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px}
.welcome h2{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);margin-bottom:10px}
.welcome p{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:24px}
.welcome-hints{display:flex;flex-direction:column;gap:8px}
.hint{padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text2);text-align:left;cursor:pointer;transition:all .15s}
.hint:hover{border-color:var(--gold-border);color:var(--text)}

/* MESSAGES */
.message{display:flex;gap:12px;padding:8px 24px;max-width:900px;margin:0 auto;width:100%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:13px}
.message.assistant .msg-avatar{background:var(--gold-dim);border:1px solid var(--gold-border)}
.message.user .msg-avatar{background:var(--bg3);border:1px solid var(--border)}
.msg-bubble{flex:1;min-width:0}
.message.user .msg-bubble{display:flex;justify-content:flex-end}
.user-text{background:var(--bg3);border:1px solid var(--border);border-radius:12px 4px 12px 12px;padding:10px 14px;max-width:70%;color:var(--text);font-size:14px;line-height:1.6}
.thinking{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px;padding:4px 0}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* MARKDOWN */
.md-content{color:var(--text2);line-height:1.7}
.md-content h1,.md-content h2{font-family:'DM Serif Display',serif;color:var(--text);margin:16px 0 8px}
.md-content h3{font-size:13px;font-weight:600;color:var(--gold);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.06em}
.md-content p{margin-bottom:10px;color:var(--text2)}
.md-content p:last-child{margin-bottom:0}
.md-content strong{color:var(--text);font-weight:600}
.md-content em{color:var(--gold);font-style:italic}
.md-content ul{list-style:none;padding:0;margin:8px 0}
.md-content li{padding:3px 0 3px 16px;position:relative;color:var(--text2)}
.md-content li::before{content:'◆';position:absolute;left:0;color:var(--gold);font-size:8px;top:7px}
.md-content code{background:var(--bg3);padding:1px 6px;border-radius:3px;font-size:12px;color:var(--gold);font-family:monospace}
.md-content blockquote{border-left:2px solid var(--gold);padding-left:14px;margin:10px 0;color:var(--text3)}

/* CHARTS */
.chart-wrap{margin:14px 0;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.chart-title-text{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border2)}

/* TABLE */
.tbl-wrap{margin:14px 0;overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.tbl-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;padding:14px 16px 10px;border-bottom:1px solid var(--border2)}
table.data-table{width:100%;border-collapse:collapse;font-size:12px}
table.data-table th{text-align:left;padding:8px 14px;color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--gold-border);font-weight:600;white-space:nowrap}
table.data-table td{padding:8px 14px;color:var(--text2);border-bottom:1px solid var(--border2);white-space:nowrap}
table.data-table tr:last-child td{border-bottom:none}
table.data-table tr:hover td{background:var(--bg3);color:var(--text)}

/* SLIDES */
.slides-wrap{margin:14px 0;border:1px solid var(--gold-border);border-radius:var(--r);overflow:hidden}
.slide{padding:28px 32px;background:linear-gradient(135deg,var(--surface) 0%,var(--bg3) 100%);min-height:200px}
.slide-num{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.slide-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:16px;line-height:1.2}
.slide-body{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:14px}
.slide-bullets{list-style:none;padding:0;display:flex;flex-direction:column;gap:8px}
.slide-bullets li{padding:8px 14px;background:rgba(255,255,255,.04);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;color:var(--text2);font-size:13px}
.slide-stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:8px}
.stat-val{font-family:'DM Serif Display',serif;font-size:30px;color:var(--gold);line-height:1;display:block}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.slide-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px;background:var(--bg3);border-top:1px solid var(--border)}
.slide-btn{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:5px 9px;border-radius:4px;font-size:14px;transition:all .15s}
.slide-btn:hover:not(:disabled){border-color:var(--gold-border);color:var(--gold)}
.slide-btn:disabled{opacity:.3;cursor:not-allowed}
.slide-dots{display:flex;gap:6px}
.slide-dot{width:6px;height:6px;border-radius:50%;background:var(--border);border:none;cursor:pointer;transition:all .15s;padding:0}
.slide-dot.active{background:var(--gold)}

/* INPUT */
.input-area{padding:16px 24px 20px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.input-wrap{display:flex;gap:10px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px 4px 4px 14px;transition:border-color .15s}
.input-wrap:focus-within{border-color:var(--gold-border)}
.chat-input{flex:1;background:none;border:none;outline:none;resize:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;max-height:120px;padding:8px 0;overflow-y:auto}
.chat-input::placeholder{color:var(--text3)}
.send-btn{width:36px;height:36px;border-radius:7px;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--bg);flex-shrink:0;transition:all .15s;font-size:16px;margin-bottom:2px}
.send-btn:hover:not(:disabled){background:#D4B460;transform:translateY(-1px)}
.send-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed;transform:none}
.input-hint{font-size:10px;color:var(--text3);margin-top:7px;text-align:center}

/* DASHBOARD */
.dash-view{flex:1;overflow-y:auto;padding:28px 32px}
.dash-view::-webkit-scrollbar{width:4px}.dash-view::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.view-hdr h1{font-family:'DM Serif Display',serif;font-size:28px;color:var(--text);margin-bottom:4px}
.view-hdr p{color:var(--text3);font-size:13px;margin-bottom:24px}
.dash-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.dash-date{font-size:13px;color:var(--text2)}
.dash-live{font-size:11px;color:#4A7C59;font-weight:500}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.kpi-card{padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;gap:12px;align-items:flex-start;transition:border-color .15s;cursor:default}
.kpi-card:hover{border-color:var(--gold-border)}
.kpi-card.accent{border-color:rgba(201,168,76,.35)}
.kpi-ico{width:30px;height:30px;border-radius:6px;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:14px}
.kpi-val{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);line-height:1.1}
.kpi-lbl{font-size:12px;color:var(--text2);margin-top:2px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.section-hdr{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;font-weight:600}
.highlights{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.hl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text2)}
.hl-dot{color:var(--gold);font-size:8px;margin-top:4px;flex-shrink:0}
.agents-list{display:flex;flex-direction:column;gap:8px}
.agent-row{display:grid;grid-template-columns:1fr 80px 90px 120px;gap:16px;align-items:center;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs)}
.agent-name{font-size:13px;font-weight:500;color:var(--text)}
.agent-deals{font-size:12px;color:var(--text2)}
.agent-rev{font-size:12px;color:var(--gold)}
.bar-wrap{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#D4B460);border-radius:2px}

/* ERROR BANNER */

</style>

async function callAgent(messages) {
  // Try proxy first (production), fallback shows error
  const r = await fetch("/api/claude", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:800,
      system:SYSTEM_PROMPT,
      messages
    })
  });
  // response always 200 from proxy
  const d = await r.json();
  if(d.error) throw new Error(d.error.message || "API error");
  return d.content[0]?.text || "Prázdná odpověď.";
}

// ============================================================
// PARSE RESPONSE
// ============================================================
function parseResponse(text) {
  const parts = [];
  const re = /```(chart|table|slides)([\s\S]*?)```/g;
  let last = 0, m;
  while((m = re.exec(text)) !== null) {
    if(m.index > last) {
      const t = text.slice(last, m.index).trim();
      if(t) parts.push({type:"text",content:t});
    }
    try {
      parts.push({type:m[1], content:JSON.parse(m[2].trim())});
    } catch(e) {
      parts.push({type:"text",content:m[0]});
    }
    last = m.index + m[0].length;
  }
  if(last < text.length) {
    const t = text.slice(last).trim();
    if(t) parts.push({type:"text",content:t});
  }
  if(!parts.length) parts.push({type:"text",content:text});
  return parts;
}

// ============================================================
// MARKDOWN
// ============================================================
function renderMd(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, m => `<ul>${m}</ul>`)
    .split('\n\n').map(p => {
      if(/^<[hul]/.test(p.trim())) return p;
      if(!p.trim()) return '';
      return `<p>${p.replace(/\n/g,'<br/>')}</p>`;
    }).join('');
}
