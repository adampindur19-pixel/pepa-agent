<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<title>PEPA — Design Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<style>
:root{
  --font:'Sora',sans-serif;--font-d:'Playfair Display',serif;
  --bg:#F4F5F7;--surface:#fff;--surface2:#F8F9FB;
  --sidebar:#0F1117;--text:#0F1117;--text2:#4B5563;--text3:#9CA3AF;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.04);
  --accent:#5B5FEF;--accent2:#818CF8;--accent-dim:rgba(91,95,239,.08);
  --green:#10B981;--green-dim:rgba(16,185,129,.1);
  --red:#EF4444;--red-dim:rgba(239,68,68,.1);--orange:#F59E0B;
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 12px 40px rgba(0,0,0,.12);
}
[data-theme=dark]{
  --bg:#0C0D14;--surface:#13141F;--surface2:#1A1B28;--sidebar:#080910;
  --text:#F1F2F8;--text2:#9CA3AF;--text3:#4B5563;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.03);
  --accent:#6366F1;--accent2:#818CF8;--accent-dim:rgba(99,102,241,.12);
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);--shadow-lg:0 12px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
button{font-family:var(--font);cursor:pointer}
input,textarea{font-family:var(--font)}
#root{display:flex;height:100dvh;overflow:hidden}

/* SIDEBAR */
.sb{width:68px;background:var(--sidebar);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:2px;flex-shrink:0;overflow:hidden;transition:width .25s}
.sb.open{width:220px;align-items:stretch;padding:16px 10px}
.sb-logo{width:40px;height:40px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;flex-shrink:0}
.sb.open .sb-logo{width:100%;height:44px;border-radius:10px;padding:0 12px;gap:8px;font-size:14px;font-weight:600;color:#fff}
.nav{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:18px;border:none;background:none;transition:all .15s;flex-shrink:0}
.nav:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7)}
.nav.on{background:rgba(255,255,255,.1);color:#fff}
.nav span.lbl{display:none;font-size:13px;font-weight:500;white-space:nowrap}
.sb.open .nav{width:100%;padding:0 12px;justify-content:flex-start;gap:12px;height:40px;border-radius:10px}
.sb.open .nav span.lbl{display:block}
.divdr{width:28px;height:1px;background:rgba(255,255,255,.06);margin:4px auto;flex-shrink:0}
.sb.open .divdr{width:100%}
.sb-btm{margin-top:auto;width:100%}
.av-btn{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.08);border:none;display:flex;align-items:center;justify-content:center;margin:0 auto;flex-shrink:0;cursor:pointer}
.av-circle{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sb.open .av-btn{width:100%;padding:0 10px;gap:10px;height:44px;border-radius:10px;background:rgba(255,255,255,.06);justify-content:flex-start}
.av-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.75);display:none}
.sb.open .av-name{display:block}
.logout{margin-left:auto;width:26px;height:26px;border-radius:8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.2);color:#F87171;font-size:12px;display:none;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sb.open .logout{display:flex}
.logout:hover{background:rgba(239,68,68,.3);color:#ef4444}

/* TOPBAR */
.topbar{height:56px;display:flex;align-items:center;padding:0 20px;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.topbar-t{font-family:var(--font-d);font-size:19px;color:var(--text);flex:1}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px}
.ic-btn{width:34px;height:34px;border-radius:10px;background:none;border:1px solid var(--border);color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.ic-btn:hover{background:var(--surface2);border-color:rgba(91,95,239,.3);color:var(--text)}
.ic-btn .bdg{position:absolute;top:-4px;right:-4px;min-width:15px;height:15px;border-radius:8px;background:var(--red);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface);padding:0 2px}
.theme-tog{width:48px;height:26px;border-radius:13px;background:var(--surface2);border:1px solid var(--border);position:relative;cursor:pointer;transition:all .2s}
.theme-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--accent);transition:transform .2s;font-size:10px;display:flex;align-items:center;justify-content:center}
[data-theme=dark] .theme-thumb{transform:translateX(22px)}
.hmbg{background:none;border:none;color:var(--text2);font-size:20px;display:none;align-items:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.scroll{flex:1;overflow-y:auto;padding:20px}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);transition:all .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi.hi{background:var(--accent);border-color:var(--accent)}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.kpi.hi .kpi-lbl{color:rgba(255,255,255,.65)}
.kpi-val{font-family:var(--font-d);font-size:28px;color:var(--text);line-height:1;margin-bottom:3px}
.kpi.hi .kpi-val{color:#fff}
.kpi-s{font-size:11px;color:var(--text3)}
.kpi.hi .kpi-s{color:rgba(255,255,255,.55)}
.trend{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;margin-top:6px;padding:2px 7px;border-radius:20px}
.trend.up{background:var(--green-dim);color:var(--green)}
.trend.dn{background:var(--red-dim);color:var(--red)}

/* GRID */
.g2{display:grid;grid-template-columns:1.8fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-t{font-size:14px;font-weight:600;color:var(--text)}
.sec-s{font-size:11px;color:var(--text3);margin-top:1px}
.see-all{font-size:12px;color:var(--accent);font-weight:500;background:none;border:none}

/* SVG CHART */
.chart-wrap{position:relative;width:100%;overflow:hidden}

/* PROP ROW */
.prow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2)}
.prow:last-child{border:none}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pname{font-size:13px;font-weight:500;color:var(--text);flex:1}
.paddr{font-size:11px;color:var(--text3)}
.pprice{font-size:12px;font-weight:600;color:var(--text)}
.pbadge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:5px;margin-top:2px;display:inline-block}
.b-sale{background:rgba(91,95,239,.1);color:var(--accent)}
.b-sold{background:var(--green-dim);color:var(--green)}
.b-res{background:rgba(245,158,11,.1);color:var(--orange)}
.b-rent{background:rgba(59,130,246,.1);color:#3B82F6}

/* AGENT */
.ag-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}

/* CHAT */
.chat-w{display:flex;flex-direction:column;height:100%}
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.msgs::-webkit-scrollbar{width:3px}
.msg{display:flex;gap:8px;max-width:680px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.m-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--border)}
.msg.assistant .m-icon{background:var(--accent);border-color:var(--accent);color:#fff}
.msg.user .m-icon{background:var(--surface);color:var(--text2)}
.m-bub{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;color:var(--text);max-width:560px}
.msg.assistant .m-bub{background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px}
.msg.user .m-bub{background:var(--accent);color:#fff;border-radius:14px 4px 14px 14px}
.chat-inp-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface)}
.chat-inp-wrap{display:flex;align-items:flex-end;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:8px 12px;transition:border-color .15s}
.chat-inp-wrap:focus-within{border-color:rgba(91,95,239,.4)}
.chat-ta{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;resize:none;max-height:90px;line-height:1.5}
.chat-ta::placeholder{color:var(--text3)}
.send-btn{width:34px;height:34px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{opacity:.35}
.hints-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 20px}
.hint{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;text-align:left}
.hint:hover{border-color:rgba(91,95,239,.3);color:var(--accent);background:var(--accent-dim)}
.dot-anim{display:flex;gap:3px;padding:2px 0}
.dot-anim span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bop .8s infinite}
.dot-anim span:nth-child(2){animation-delay:.15s}
.dot-anim span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* TASKS */
.task-i{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;transition:all .15s}
.task-i:hover{border-color:rgba(91,95,239,.25)}
.chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-size:10px;color:#fff}
.chk.done{background:var(--green);border-color:var(--green)}
.t-txt{font-size:13px;color:var(--text);flex:1}
.t-txt.done{text-decoration:line-through;color:var(--text3)}
.t-dt{font-size:10px;color:var(--text3)}
.t-del{background:none;border:none;color:var(--text3);font-size:15px;opacity:0;transition:opacity .15s}
.task-i:hover .t-del{opacity:1;cursor:pointer}

/* ANALYTICS */
.a-bar{display:flex;align-items:flex-end;gap:6px;height:140px;padding:0 4px}
.a-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.a-bar-fill{width:100%;border-radius:6px 6px 0 0;transition:height .4s;min-width:20px}
.a-bar-lbl{font-size:10px;color:var(--text3);white-space:nowrap}
.a-bar-val{font-size:10px;font-weight:600;color:var(--text2)}

/* PAGE */
.pg-t{font-family:var(--font-d);font-size:24px;color:var(--text);margin-bottom:3px}
.pg-s{font-size:12px;color:var(--text3);margin-bottom:16px}
.btn-p{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:var(--font);transition:all .15s}
.btn-p:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-s{padding:9px 18px;background:none;color:var(--text2);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;font-family:var(--font);transition:all .15s}
.btn-s:hover{border-color:rgba(91,95,239,.3);color:var(--accent)}

/* PROP CARD */
.prop-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.prop-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(91,95,239,.2)}

/* MOBILE */
@media(max-width:768px){
  .sb{width:52px}.sb.open{position:fixed;top:0;left:0;height:100dvh;z-index:200;width:75vw;max-width:250px}
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
  .sb-overlay.show{display:block}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .scroll{padding:12px}
  .hmbg{display:flex}
  .hints-grid{grid-template-columns:1fr}
}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .35s ease forwards}
.d1{animation-delay:.05s;opacity:0}.d2{animation-delay:.1s;opacity:0}.d3{animation-delay:.15s;opacity:0}.d4{animation-delay:.2s;opacity:0}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef}=React;

const AGENTS=[
  {name:'Markéta Horáčková',ini:'MH',color:'#5B5FEF',deals:8,leads:24,rev:18.5},
  {name:'Tomáš Novák',ini:'TN',color:'#10B981',deals:6,leads:18,rev:14.2},
  {name:'Jana Veselá',ini:'JV',color:'#F59E0B',deals:5,leads:15,rev:11.8},
];
const PROPS=[
  {id:'NEM-001',name:'Byt 3+kk, Vinohrady',addr:'Praha 2',price:'8,90 M',status:'k prodeji',size:82,color:'#5B5FEF',bc:'b-sale'},
  {id:'NEM-002',name:'Rodinný dům, Průhonice',addr:'Průhonice',price:'15,50 M',status:'k prodeji',size:210,color:'#5B5FEF',bc:'b-sale'},
  {id:'NEM-003',name:'Kancelář, Smíchov',addr:'Praha 5',price:'42 000/měs',status:'pronájem',size:155,color:'#3B82F6',bc:'b-rent'},
  {id:'NEM-004',name:'Byt 1+kk, Žižkov',addr:'Praha 3',price:'4,20 M',status:'prodáno',size:38,color:'#10B981',bc:'b-sold'},
  {id:'NEM-005',name:'Byt 2+1, Dejvice',addr:'Praha 6',price:'7,10 M',status:'rezervace',size:65,color:'#F59E0B',bc:'b-res'},
  {id:'NEM-010',name:'Penthouse, Pankrác',addr:'Praha 4',price:'19,50 M',status:'k prodeji',size:180,color:'#5B5FEF',bc:'b-sale'},
];
const LEADS=[
  {m:'Říj',v:38},{m:'Lis',v:45},{m:'Pro',v:41},{m:'Led',v:52},{m:'Úno',v:58},{m:'Bře',v:63}
];
const PRODEJE=[{m:'Říj',v:4},{m:'Lis',v:5},{m:'Pro',v:3},{m:'Led',v:6},{m:'Úno',v:7},{m:'Bře',v:8}];

// Simple SVG Area Chart
function AreaChart({data,color,h=160}){
  const max=Math.max(...data.map(d=>d.v));
  const w=300,pad=8;
  const pts=data.map((d,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=h-pad-(d.v/max)*(h-pad*2);
    return [x,y];
  });
  const path='M'+pts.map(p=>p.join(',')).join(' L');
  const area=path+' L'+pts[pts.length-1][0]+','+h+' L'+pts[0][0]+','+h+' Z';
  return React.createElement('svg',{viewBox:`0 0 ${w} ${h}`,style:{width:'100%',height:h,display:'block'}},
    React.createElement('defs',null,
      React.createElement('linearGradient',{id:'g'+color.replace('#',''),x1:0,y1:0,x2:0,y2:1},
        React.createElement('stop',{offset:'0%',stopColor:color,stopOpacity:.2}),
        React.createElement('stop',{offset:'100%',stopColor:color,stopOpacity:0})
      )
    ),
    React.createElement('path',{d:area,fill:`url(#g${color.replace('#','')})`}),
    React.createElement('path',{d:path,fill:'none',stroke:color,strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}),
    ...pts.map((p,i)=>React.createElement('text',{key:i,x:p[0],y:h-1,textAnchor:'middle',fontSize:9,fill:'var(--text3)'},data[i].m))
  );
}

// Sidebar
function Sidebar({view,setView,open,setOpen}){
  const nav=[
    {id:'home',ic:'⊞',lb:'Přehled'},
    {id:'chat',ic:'💬',lb:'Chat s PEPOU'},
    {id:'tasks',ic:'✅',lb:'Úkoly'},
    {id:'analytics',ic:'📊',lb:'Analýzy'},
    {id:'map',ic:'🗺️',lb:'Nemovitosti'},
  ];
  return React.createElement(React.Fragment,null,
    React.createElement('div',{className:'sb-overlay'+(open?' show':''),onClick:()=>setOpen(false)}),
    React.createElement('aside',{className:'sb'+(open?' open':'')},
      React.createElement('div',{className:'sb-logo'},open?'🏢 PEPA':'🏢'),
      nav.map(n=>React.createElement('button',{key:n.id,className:'nav'+(view===n.id?' on':''),onClick:()=>{setView(n.id);setOpen(false);}},
        React.createElement('span',null,n.ic),
        React.createElement('span',{className:'lbl'},n.lb)
      )),
      React.createElement('div',{className:'divdr'}),
      React.createElement('div',{className:'sb-btm'},
        React.createElement('div',{className:'av-btn'},
          React.createElement('div',{className:'av-circle'},'A'),
          React.createElement('span',{className:'av-name'},'Adam Novotný'),
          React.createElement('button',{className:'logout',title:'Odhlásit se',onClick:e=>e.stopPropagation()},'⏻')
        )
      )
    )
  );
}

// Topbar
function Topbar({view,setOpen,theme,setTheme}){
  const ts={home:'Přehled',chat:'Chat s PEPOU',tasks:'Úkoly',analytics:'Analýzy',map:'Nemovitosti'};
  return React.createElement('header',{className:'topbar'},
    React.createElement('button',{className:'hmbg',onClick:()=>setOpen(v=>!v)},'☰'),
    React.createElement('div',{style:{flex:1}},
      React.createElement('div',{className:'topbar-t'},ts[view]),
      React.createElement('div',{className:'topbar-sub'},'Bohemia Reality s.r.o.')
    ),
    React.createElement('div',{style:{display:'flex',gap:8,alignItems:'center'}},
      React.createElement('button',{className:'ic-btn'},'🔔',React.createElement('span',{className:'bdg'},'3')),
      React.createElement('button',{className:'ic-btn'},'📄'),
      React.createElement('div',{className:'theme-tog',onClick:()=>setTheme(t=>t==='light'?'dark':'light')},
        React.createElement('div',{className:'theme-thumb'},theme==='light'?'☀️':'🌙')
      )
    )
  );
}

// Home
function Home({setView}){
  return React.createElement('div',{className:'scroll'},
    React.createElement('div',{className:'kpi-grid'},
      React.createElement('div',{className:'kpi hi fade'},
        React.createElement('div',{className:'kpi-lbl'},'Celkové tržby'),
        React.createElement('div',{className:'kpi-val'},'44,5 M'),
        React.createElement('div',{className:'kpi-s'},'Kč · Q1 2025'),
        React.createElement('div',{className:'trend up'},'↑ +12%')
      ),
      React.createElement('div',{className:'kpi fade d1'},
        React.createElement('div',{className:'kpi-lbl'},'Uzavřené obchody'),
        React.createElement('div',{className:'kpi-val'},'19'),
        React.createElement('div',{className:'kpi-s'},'nemovitostí'),
        React.createElement('div',{className:'trend up'},'↑ +3 vs Q4')
      ),
      React.createElement('div',{className:'kpi fade d2'},
        React.createElement('div',{className:'kpi-lbl'},'Portfolio'),
        React.createElement('div',{className:'kpi-val'},'4'),
        React.createElement('div',{className:'kpi-s'},'k prodeji'),

// Chat
function Chat(){
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState('');
  const [busy,setBusy]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  async function send(t){
    const txt=(t||inp).trim();if(!txt||busy)return;
    setInp('');
    const um={role:'user',content:txt};
    setMsgs(p=>[...p,um,{role:'assistant',content:''}]);
    setBusy(true);
    try{
      const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,stream:true,
          system:'Jsi PEPA, AI asistent pro back office Bohemia Reality. Odpovídej stručně v češtině.',
          messages:[...msgs,um].map(m=>({role:m.role,content:m.content}))})});
      const rd=r.body.getReader();const dc=new TextDecoder();let full='';
      while(true){
        const{done,value}=await rd.read();if(done)break;
        for(const line of dc.decode(value,{stream:true}).split('\n')){
          if(!line.startsWith('data: '))continue;
          const d=line.slice(6).trim();if(!d||d==='[DONE]')continue;
          try{const p=JSON.parse(d);if(p.type==='content_block_delta'){full+=p.delta?.text||'';setMsgs(prev=>{const n=[...prev];n[n.length-1]={role:'assistant',content:full};return n;});}}catch(e){}
        }
      }
    }catch(e){setMsgs(p=>{const n=[...p];n[n.length-1]={role:'assistant',content:'Chyba: '+e.message};return n;});}
    finally{setBusy(false);}
  }

  const hints=['Stav portfolia?','Ranní briefing na dnes','Nejdéle neprodané?','Email ABC Invest'];
  return React.createElement('div',{className:'chat-w'},
    React.createElement('div',{className:'msgs'},
      msgs.length===0&&React.createElement('div',{style:{maxWidth:480,margin:'20px auto'}},
        React.createElement('div',{style:{fontSize:28,marginBottom:8}},'✨'),
        React.createElement('div',{style:{fontFamily:'var(--font-d)',fontSize:20,color:'var(--text)',marginBottom:4}},'Jak mohu pomoci?'),
        React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginBottom:16}},'Zeptejte se na portfolio, klienty nebo reporty.'),
        React.createElement('div',{className:'hints-grid',style:{padding:0}},hints.map(h=>React.createElement('button',{key:h,className:'hint',onClick:()=>send(h)},h)))
      ),
      msgs.map((m,i)=>React.createElement('div',{key:i,className:'msg '+m.role},
        React.createElement('div',{className:'m-icon'},m.role==='assistant'?'✨':'👤'),
        React.createElement('div',{className:'m-bub'},
          m.role==='assistant'&&!m.content&&busy?React.createElement('div',{className:'dot-anim'},React.createElement('span'),React.createElement('span'),React.createElement('span')):m.content
        )
      )),
      React.createElement('div',{ref})
    ),
    React.createElement('div',{className:'chat-inp-area'},
      React.createElement('div',{className:'chat-inp-wrap'},
        React.createElement('textarea',{className:'chat-ta',rows:1,placeholder:'Napište zprávu…',value:inp,onChange:e=>setInp(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}),
        React.createElement('button',{className:'send-btn',disabled:!inp.trim()||busy,onClick:()=>send()},'↑')
      )
    )
  );
}

// Tasks
function Tasks(){
  const [tasks,setTasks]=useState([
    {id:1,t:'Dokumenty pro NEM-010',done:false,dt:'26. 3.'},
    {id:2,t:'Odpovědět ABC Invest',done:false,dt:'27. 3.'},
    {id:3,t:'Aktualizovat Vila Průhonice',done:true,dt:'25. 3.'},
  ]);
  const [inp,setInp]=useState('');
  const add=()=>{if(!inp.trim())return;setTasks(p=>[...p,{id:Date.now(),t:inp.trim(),done:false,dt:new Date().toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric'})}]);setInp('');};
  return React.createElement('div',{className:'scroll'},
    React.createElement('div',{className:'pg-t'},'Úkoly'),
    React.createElement('div',{className:'pg-s'},tasks.filter(t=>!t.done).length+' aktivních · '+tasks.filter(t=>t.done).length+' hotových'),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8,marginBottom:16}},
      React.createElement('input',{style:{width:'100%',padding:'11px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,color:'var(--text)',fontSize:15,outline:'none',fontFamily:'var(--font)'},
        placeholder:'Přidat nový úkol…',value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>{if(e.key==='Enter')add();}}),
      React.createElement('button',{className:'btn-p',onClick:add},'+ Přidat úkol')
    ),
    tasks.map(t=>React.createElement('div',{key:t.id,className:'task-i'},
      React.createElement('button',{className:'chk'+(t.done?' done':''),onClick:()=>setTasks(p=>p.map(x=>x.id===t.id?{...x,done:!x.done}:x))},t.done?'✓':''),
      React.createElement('span',{className:'t-txt'+(t.done?' done':'')},t.t),
      React.createElement('span',{className:'t-dt'},t.dt),
      React.createElement('button',{className:'t-del',onClick:()=>setTasks(p=>p.filter(x=>x.id!==t.id))},'×')
    ))
  );
}
